name: Release Image

on:
  # Fires when CI completes successfully on main (human-triggered pushes).
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Fires directly on push to main — catches auto-merge squashes made by
  # GITHUB_TOKEN (those don't re-trigger CI, so workflow_run never fires).
  push:
    branches: [main]

jobs:
  push:
    # For workflow_run: only run if CI passed.
    # For push: always run (branch protection already enforced CI on the PR).
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.sha }}
            BUILD_TIMESTAMP=${{ github.run_started_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger server deploy
        run: |
          curl -fsS -X POST https://sentinelai.cloud/webhooks/deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d "{\"image\": \"$IMAGE:latest\", \"sha\": \"${{ steps.sha.outputs.sha }}\"}"
