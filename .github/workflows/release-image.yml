name: Release Image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # Fire on main (post-merge deploy) AND sentinel/* (pre-merge image build).
    # Previously only [main] — CI on PR branches never triggered a release.
    branches: [main, "sentinel/**"]

jobs:
  push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # On main: tag latest + sha  (deploy will use :latest)
      # On sentinel/*: tag sha only (no :latest, prevents overwriting prod tag)
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=sha,prefix=sha-,format=short

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.event.workflow_run.head_sha }}
            BUILD_TIMESTAMP=${{ github.event.workflow_run.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy only fires on main — sentinel/* branches build the image but
      # do not push to prod until the PR is merged and main CI passes.
      - name: Trigger server deploy
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        run: |
          curl -fsS -X POST https://sentinelai.cloud/webhooks/deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d "{\"image\": \"$IMAGE:latest\", \"sha\": \"${{ github.event.workflow_run.head_sha }}\"}"
