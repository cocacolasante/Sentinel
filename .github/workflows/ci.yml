name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.9.0

      - name: Check for code errors
        run: ruff check .

  # ── Job 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key
      LOG_DIR: /tmp/aibrain-test-logs
      REDIS_HOST: localhost
      REDIS_PASSWORD: ""
      POSTGRES_HOST: localhost
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: aibrain
      QDRANT_HOST: localhost
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      SLACK_BOT_TOKEN: ""
      SLACK_SIGNING_SECRET: ""
      SLACK_APP_TOKEN: ""
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Build Docker image ──────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sentinel-brain:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Promote to main ─────────────────────────────────────────────────
  promote:
    name: Promote to main
    runs-on: ubuntu-latest
    needs: build
    if: github.ref != 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --no-ff origin/${{ github.ref_name }} -m "ci: auto-merge ${{ github.ref_name }} after CI pass"
          git push origin main
