events {
    worker_connections 1024;
}

http {
    upstream brain {
        server brain:8000;
    }

    upstream n8n {
        server n8n:5678;
    }

    upstream flower {
        server flower:5555;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream homeassistant {
        server home-assistant:8123;
    }

    # Rate limit zone for Home Assistant path
    limit_req_zone $binary_remote_addr zone=ha_limit:10m rate=10r/s;

    # ── HTTP → HTTPS redirect (and Let's Encrypt ACME) ──────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt cert renewal challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — Brain ────────────────────────────────────────────
    # NOTE: For initial HTTP-only testing, comment out this block
    # and add a plain HTTP server block (listen 80) that proxy_passes
    # to brain. Add SSL once you have Let's Encrypt certs.
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;   # <── replace with your domain

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        client_max_body_size 10M;

        # Brain API
        location / {
            proxy_pass         http://brain;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        # n8n sub-path (for webhook callbacks from Brain → n8n)
        location /n8n/ {
            proxy_pass         http://n8n/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        # Flower — Celery task monitoring UI
        # Secured by Flower's own basic auth (FLOWER_USER / FLOWER_PASSWORD)
        location /flower/ {
            proxy_pass         http://flower/flower/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Grafana — infrastructure metrics dashboards
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        # Home Assistant — browser UI and Alexa OAuth callback
        # Remove or IP-restrict this block after initial setup
        location /ha/ {
            limit_req          zone=ha_limit burst=20 nodelay;
            proxy_pass         http://homeassistant/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support — HA frontend uses long-lived WS connections
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
