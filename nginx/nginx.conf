events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Rate limit zone for Home Assistant
    limit_req_zone $binary_remote_addr zone=ha_limit:10m rate=10r/s;

    # -------------------------
    # HTTP — ACME challenge + redirect to HTTPS
    # -------------------------
    server {
        listen 80;
        server_name sentinelai.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------
    # HTTPS reverse proxy
    # -------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name sentinelai.cloud;

        ssl_certificate     /etc/letsencrypt/live/sentinelai.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sentinelai.cloud/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        client_max_body_size 20M;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # -------------------------
        # Deploy webhook — public (GitHub Actions needs this); secret header
        # in deploy-agent validates the caller
        # -------------------------
        location /webhooks/ {
            set $deployer deploy-agent:9000;
            proxy_pass http://$deployer;
            proxy_read_timeout 10s;
        }

        # -------------------------
        # Everything else — Tailscale only
        # Tailscale CGNAT range: 100.64.0.0/10
        # On your MacBook add to /etc/hosts:  100.100.130.77  sentinelai.cloud
        # so your browser connects via the Tailscale interface.
        # -------------------------

        location = / {
            allow 100.64.0.0/10;
            deny  all;
            return 302 /grafana/;
        }

        location /grafana/ {
            allow 100.64.0.0/10;
            deny  all;
            set $grafana_backend grafana:3000;
            proxy_pass http://$grafana_backend;
            proxy_read_timeout 60s;
        }

        location /n8n/ {
            allow 100.64.0.0/10;
            deny  all;
            set $n8n_backend n8n:5678;
            proxy_pass http://$n8n_backend;
            proxy_read_timeout 60s;
        }

        location /flower/ {
            allow 100.64.0.0/10;
            deny  all;
            set $flower_backend flower:5555;
            proxy_pass http://$flower_backend;
            proxy_read_timeout 60s;
        }

        location /api/ {
            allow 100.64.0.0/10;
            deny  all;
            set $brain_backend brain:8000;
            proxy_pass http://$brain_backend;
            proxy_read_timeout 60s;
        }

        location /ha/ {
            allow 100.64.0.0/10;
            deny  all;
            set $ha_backend home-assistant:8123;
            limit_req zone=ha_limit burst=20 nodelay;
            proxy_pass http://$ha_backend/;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
