events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS
    resolver 127.0.0.11 ipv6=off valid=10s;

    # -------- Upstreams (Docker service names) --------
    upstream brain {
        server brain:8000;
    }

    upstream n8n {
        server n8n:5678;
    }

    upstream flower {
        server flower:5555;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream homeassistant {
        server home-assistant:8123;
    }

    # Rate limit zone for Home Assistant
    limit_req_zone $binary_remote_addr zone=ha_limit:10m rate=10r/s;

    # -------------------------
    # HTTP — ACME challenge + redirect to HTTPS
    # -------------------------
    server {
        listen 80;
        server_name sentinelai.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------
    # HTTPS reverse proxy
    # -------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name sentinelai.cloud;

        ssl_certificate     /etc/letsencrypt/live/sentinelai.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sentinelai.cloud/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        client_max_body_size 20M;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # -------------------------
        # Root → Grafana dashboard
        # -------------------------
        location = / {
            return 302 /grafana/;
        }

        # -------------------------
        # Grafana — pass full /grafana/ path so Grafana's subpath config works
        # (proxy_pass without trailing slash preserves the URI prefix)
        # -------------------------
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # n8n — pass full /n8n/ path (N8N_PATH=/n8n set in compose)
        # -------------------------
        location /n8n/ {
            proxy_pass http://n8n;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # Flower — pass full /flower/ path (--url_prefix=flower set in compose)
        # -------------------------
        location /flower/ {
            proxy_pass http://flower;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # Brain API — forward full path; brain routes live at /api/v1/*
        # -------------------------
        location /api/ {
            proxy_pass http://brain;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # Home Assistant — strip /ha/ prefix
        # -------------------------
        location /ha/ {
            limit_req zone=ha_limit burst=20 nodelay;
            proxy_pass http://homeassistant/;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
