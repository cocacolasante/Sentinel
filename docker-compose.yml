version: '3.8'

services:

  # ── AI Brain (FastAPI) ──────────────────────────────────────
  brain:
    build: .
    container_name: ai-brain
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - brain-net

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-net

  # ── Redis (Hot Memory) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-net

  # ── Qdrant (Vector / Long-term Memory) ───────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - brain-net

  # ── n8n (Action Executor — NOT the Brain) ────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=https://${DOMAIN}/n8n/
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    networks:
      - brain-net

  # ── Nginx (Reverse Proxy + SSL Termination) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - brain
      - flower
      - grafana
    networks:
      - brain-net

  # ── Celery Worker ─────────────────────────────────────────────
  celery-worker:
    build: .
    container_name: ai-celery-worker
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      -E
      -Q evals,celery
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - brain-net
    restart: unless-stopped

  # ── Celery Beat (scheduler) ───────────────────────────────────
  # Owns the cron schedule — replaces APScheduler in the brain process.
  celery-beat:
    build: .
    container_name: ai-celery-beat
    command: >
      celery -A app.worker.celery_app beat
      --loglevel=info
      --schedule /app/celerybeat-data/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celery-beat-data:/app/celerybeat-data
    networks:
      - brain-net
    restart: unless-stopped

  # ── Flower (Celery task UI) ───────────────────────────────────
  # Access via https://your-domain.com/flower/
  flower:
    build: .
    container_name: ai-flower
    command: >
      celery -A app.worker.celery_app flower
      --port=5555
      --url_prefix=flower
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    env_file:
      - .env
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - celery-worker
    networks:
      - brain-net
    restart: unless-stopped

  # ── Redis Exporter (Prometheus metrics for Redis) ─────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ai-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - brain-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Exporter (Prometheus metrics for Celery) ───────────
  celery-exporter:
    image: danihodovic/celery-exporter:0.10.3
    container_name: ai-celery-exporter
    command: --broker-url=redis://:${REDIS_PASSWORD}@redis:6379/1
    networks:
      - brain-net
    restart: unless-stopped
    depends_on:
      - celery-worker

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: ai-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - brain-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────
  # Access via https://your-domain.com/grafana/
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ai-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-changeme}"
      GF_SERVER_ROOT_URL:         "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/brain_overview.json"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - brain-net
    restart: unless-stopped

networks:
  brain-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  n8n-data:
  celery-beat-data:
  prometheus-data:
  grafana-data:
