services:

  # ── AI Brain (FastAPI) ──────────────────────────────────────
  brain:
    image: ghcr.io/cocacolasante/sentinel:${IMAGE_TAG:-latest}
    build: .
    container_name: ai-brain
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Point RepoClient at the bind-mounted live host code
      REPO_LOCAL_PATH: /sentinel-project
      GH_TOKEN: ${GITHUB_TOKEN}    # enables gh pr create inside container
    volumes:
      # SSH key for git push to GitHub (read-only)
      - ${HOME}/.ssh:/root/.ssh:ro
      # Persistent workspace where the Brain clones its own repo
      - brain-workspace:/workspace
      # Docker socket — lets the brain run docker restart / docker compose
      - /var/run/docker.sock:/var/run/docker.sock
      # Live host code — AI can read/write/commit/push from inside the container
      - /root/sentinel:/sentinel-project
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - brain-net

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-net

  # ── Redis (Hot Memory) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-net

  # ── Qdrant (Vector / Long-term Memory) ───────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - brain-net

  # ── n8n (Action Executor — NOT the Brain) ────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=sentinelai.cloud
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_PATH=/n8n
      - N8N_EDITOR_BASE_URL=https://sentinelai.cloud/n8n/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=https://sentinelai.cloud/n8n/
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    networks:
      - brain-net

  # ── Home Assistant (Smart Home Controller) ───────────────────
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ai-homeassistant
    restart: unless-stopped
    privileged: true
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - ha-config:/config
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - brain-net

  # ── Nginx (Reverse Proxy + SSL Termination) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - brain
      - flower
      - grafana
    networks:
      - brain-net

  # ── Certbot (Let's Encrypt SSL — auto-renewal) ────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ai-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────
  celery-worker:
    image: ghcr.io/cocacolasante/sentinel:${IMAGE_TAG:-latest}
    build: .
    container_name: ai-celery-worker
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      -E
      -Q evals,celery
    env_file:
      - .env
    environment:
      REPO_LOCAL_PATH: /sentinel-project
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # Docker socket — lets the worker run "docker compose build/up" for self-deploy
      - /var/run/docker.sock:/var/run/docker.sock
      # Host project dir — gives docker compose access to Dockerfile + source
      - /root/sentinel:/sentinel-project
      # SSH key — needed for git pull during deploy
      - ${HOME}/.ssh:/root/.ssh:ro
    networks:
      - brain-net
    restart: unless-stopped

  # ── Celery Beat (scheduler) ───────────────────────────────────
  # Owns the cron schedule — replaces APScheduler in the brain process.
  celery-beat:
    image: ghcr.io/cocacolasante/sentinel:${IMAGE_TAG:-latest}
    build: .
    container_name: ai-celery-beat
    command: >
      celery -A app.worker.celery_app beat
      --loglevel=info
      --schedule /app/celerybeat-data/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celery-beat-data:/app/celerybeat-data
    networks:
      - brain-net
    restart: unless-stopped

  # ── Flower (Celery task UI) ───────────────────────────────────
  # Access via https://your-domain.com/flower/
  flower:
    image: ghcr.io/cocacolasante/sentinel:${IMAGE_TAG:-latest}
    build: .
    container_name: ai-flower
    command: >
      celery -A app.worker.celery_app flower
      --port=5555
      --url_prefix=flower
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    env_file:
      - .env
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - celery-worker
    networks:
      - brain-net
    restart: unless-stopped

  # ── Loki (Log aggregation) ────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: brain-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - brain-net

  # ── Promtail (Log shipper → Loki) ────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: brain-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - brain-net
    depends_on:
      - loki

  # ── PostgreSQL Exporter (Prometheus metrics for Postgres) ─────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: brain-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - brain-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Node Exporter (host CPU / memory / disk metrics) ─────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: brain-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - brain-net

  # ── Redis Exporter (Prometheus metrics for Redis) ─────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ai-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - brain-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Exporter (Prometheus metrics for Celery) ───────────
  celery-exporter:
    image: danihodovic/celery-exporter:0.10.3
    container_name: ai-celery-exporter
    command: --broker-url=redis://:${REDIS_PASSWORD}@redis:6379/1
    networks:
      - brain-net
    restart: unless-stopped
    depends_on:
      - celery-worker

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: ai-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - brain-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────
  # Access via https://your-domain.com/grafana/
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ai-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-changeme}"
      GF_SERVER_ROOT_URL:         "https://sentinelai.cloud/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/brain_overview.json"
      GF_INSTALL_PLUGINS:              "grafana-sentry-datasource"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      SENTRY_AUTH_TOKEN:               "${SENTRY_AUTH_TOKEN:-}"
      SENTRY_ORG:                      "${SENTRY_ORG:-}"
      POSTGRES_USER:                   "${POSTGRES_USER}"
      POSTGRES_PASSWORD:               "${POSTGRES_PASSWORD}"
      POSTGRES_DB:                     "${POSTGRES_DB}"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - brain-net
    restart: unless-stopped

  # ── Deploy Agent (webhook receiver — stays up during brain restarts) ──────
  deploy-agent:
    image: python:3.11-slim
    container_name: ai-deploy-agent
    restart: unless-stopped
    environment:
      DEPLOY_WEBHOOK_SECRET: ${DEPLOY_WEBHOOK_SECRET}
      GHCR_PAT:              ${GHCR_PAT:-}
      GITHUB_TOKEN:          ${GITHUB_TOKEN:-}
      GITHUB_USERNAME:       ${GITHUB_USERNAME:-cocacolasante}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/sentinel:/sentinel-project
      - ./deploy:/deploy:ro
      # Bind-mount host docker + docker-compose binaries (read-only)
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker:/usr/libexec/docker:ro
    command: python /deploy/webhook_server.py
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - brain-net

networks:
  brain-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  n8n-data:
  celery-beat-data:
  prometheus-data:
  grafana-data:
  loki_data:
  ha-config:
  brain-workspace:
