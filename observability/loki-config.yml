auth_enabled: false
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  grpc_server_max_connection_idle: 2h30m
  grpc_server_max_connection_age: 4h
  grpc_server_max_connection_age_grace: 30m
  grpc_server_keepalive_time: 60s
  grpc_server_keepalive_timeout: 10s
  grpc_server_min_time_between_pings: 10s
  grpc_server_ping_without_stream_allowed: true
  grpc_server_max_concurrent_streams: 200
  http_server_read_timeout: 60s
  http_server_write_timeout: 60s
  grpc_server_max_recv_msg_size: 104857600
  grpc_server_max_send_msg_size: 104857600
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
schema_config:
  configs:
  - from: 2024-01-01
    store: boltdb-shipper
    object_store: filesystem
    schema: v11
    index:
      prefix: index_
      period: 24h
  - from: '2025-01-01'
    store: boltdb-shipper
    object_store: filesystem
    schema: v11
    index:
      prefix: index_
      period: 24h
  - from: 2026-03-05
    store: tsdb
    object_store: filesystem
    schema: v13
    index:
      prefix: tsdb_index_
      period: 24h
  - from: 2026-03-12
    store: tsdb
    object_store: filesystem
    schema: v13
    index:
      prefix: tsdb_index_
      period: 24h
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks
ingester:
  wal:
    enabled: true
    dir: /loki/wal
  chunk_idle_period: 1m
  chunk_retain_period: 10s
  max_chunk_age: 2h
  chunk_encoding: snappy
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 10
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 15
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  max_query_parallelism: 32
  max_query_lookback: 30d
  max_query_length: 10000h
  retention_period: 720h
frontend_worker:
  scheduler_address: ''
  frontend_address: 127.0.0.1:9096
  grpc_client_config:
    max_recv_msg_size: 104857600
    max_send_msg_size: 104857600
    grpc_compression: gzip
    backoff_on_ratelimits: false
    backoff_config:
      min_period: 100ms
      max_period: 10s
      max_retries: 10
frontend:
  max_outstanding_requests_per_tenant: 100
  grpc_client_config:
    max_recv_msg_size: 104857600
    max_send_msg_size: 104857600
    grpc_compression: gzip
    backoff_on_ratelimits: false
    backoff_config:
      min_period: 100ms
      max_period: 10s
      max_retries: 10
query_range:
  parallelise_shardable_queries: false
  cache_results: true
  max_retries: 5
querier:
  engine:
    timeout: 10m
  max_concurrent: 50
chunk_store_config:
  max_look_back_period: 0s
table_manager:
  retention_deletes_enabled: false
  retention_period: 0s
query_scheduler:
  max_outstanding_requests_per_tenant: 100
