server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    # Step 1: parse the outer Docker JSON wrapper {"log":"...","stream":"stdout","time":"..."}
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream

      # Step 2: parse the inner Loguru JSON inside the log field
      - json:
          source: output
          expressions:
            level: level
            agent: agent
            source: source

      # Step 3: promote extracted fields to Loki labels
      - labels:
          stream:
          level:
          agent:
          source:

      # Step 4: use the actual log message as the log line
      - output:
          source: output

    # Extract short container ID from the file path for filtering
    relabel_configs:
      - source_labels: [__path__]
        regex: '/var/lib/docker/containers/([a-f0-9]{12})[a-f0-9]*/.*'
        target_label: container_id
        replacement: '${1}'
