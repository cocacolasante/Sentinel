global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: aibrain

scrape_configs:

  # AI Brain FastAPI — custom brain_* metrics + HTTP instrumentation
  - job_name: brain
    static_configs:
      - targets: ["brain:8000"]
    metrics_path: /metrics

  # Redis — memory, connections, hit/miss rate
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Celery — task queue depth, success/failure rate, worker count
  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  # Flower — Celery task monitoring
  - job_name: flower
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  # n8n — workflow executor
  - job_name: n8n
    static_configs:
      - targets: ["n8n:5678"]
    metrics_path: /metrics

  # PostgreSQL — connection pool, query stats
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Host — CPU, memory, disk, network
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # cAdvisor — per-container CPU, memory, network metrics
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Prometheus self-metrics
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
